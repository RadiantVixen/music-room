services:
  auth-postgres:
    image: postgres:15
    restart: unless-stopped
    networks:
      - transcendence
    ports:
      - "5433:5432"
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    env_file: .env

  auth-service:
    depends_on:
      - auth-postgres
    build:
      context: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - transcendence
    env_file:
      - .env

networks:
  transcendence:
    driver: bridge

volumes:
  auth_pgdata:

